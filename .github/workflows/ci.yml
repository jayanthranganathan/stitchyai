name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (lint, types, tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: thugil
          POSTGRES_PASSWORD: thugil
          POSTGRES_DB: thugil
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U thugil"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://thugil:thugil@localhost:5432/thugil
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - run: pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check app tests
      - run: ruff format --check app tests
      - run: mypy app
      - run: pytest -q

  mobile:
    name: Mobile (lint, types)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: mobile/package-lock.json
      - run: npm ci || npm install
      - run: npm run lint
      - run: npm run typecheck
