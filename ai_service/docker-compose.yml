version: "3.9"

# Full production stack: existing API + AI inference service + workers
# Usage: docker compose -f backend/docker-compose.yml -f ai_service/docker-compose.yml up

services:

  # ── AI inference worker (GPU) ────────────────────────────────────────────
  ai-worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: thugil-ai-worker:latest
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    env_file:
      - .env
    volumes:
      - ai_models:/workspace/models
      - celery_logs:/var/log/celery
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "celery", "-A", "ai_service.workers.celery_app", "inspect", "ping"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 120s  # model loading takes time

  # ── Celery Flower monitoring dashboard ───────────────────────────────────
  flower:
    image: mher/flower:2.0
    environment:
      CELERY_BROKER_URL: "${REDIS_URL:-redis://redis:6379/0}"
      FLOWER_BASIC_AUTH: "admin:${FLOWER_PASSWORD:-changeme}"
    ports:
      - "5555:5555"
    depends_on:
      - redis
    restart: unless-stopped

  # ── Redis (shared with main backend) ─────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  ai_models:
    driver: local
    driver_opts:
      type: none
      device: /opt/thugil/models   # host path — mount to SSD with ~50 GB free
      o: bind
  celery_logs:
  redis_data:
